services:
  api:
    build: ./backend/
    container_name: jobs_backend
    ports:
      - "3000:3000"
    volumes:
      - "./backend:/backend"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: jobs_postgres
    env_file: database/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
